# 诊所截止日期账本 — legal-clinic
#
# 由 /legal-clinic:deadlines --add 填充（或在 /client-intake、
# /draft、/status 等 skill 发现截止日期时自动提取）。由
# /legal-clinic:deadlines --report 读取，用于跨案件汇总。
#
# 诊所工作中遗漏截止日期将使督导律师承担渎职风险。
# 请将此文件视为操作记录。
#
# ──────────────────────────────────────────────────────────────────────────
# Schema（数据结构）
# ──────────────────────────────────────────────────────────────────────────
# - id:             string（slug：[case]-[简短描述]-[YYYY-MM]）
#   case_id:        string — 引用接案系统中的案件/当事人
#   case_name:      string — 便于阅读的案件名称
#   practice_area:  immigration | housing | family | consumer | criminal-defense | civil-rights | other
#   type:           filing | hearing | statute-of-limitations | discovery | cure-period | response | notice | other
#   description:    string — 一行说明应交付什么
#   due_date:       YYYY-MM-DD
#   time:           HH:MM（可选；适用于有特定截止时间的听证或提交截止日期）
#   timezone:       string（可选；默认从 CLAUDE.md 司法管辖区读取）
#   source:         string — 截止日期来源（法院命令、法规、当事人文件等）
#   owner_student:  string — 负责此截止日期的学生
#   owner_attorney: string — 督导律师（通常来自 CLAUDE.md）
#   status:         upcoming | today | overdue | completed | closed
#   completed_date: YYYY-MM-DD | null
#   notes:          string | null
#   created:        YYYY-MM-DD
#   created_by:     string — 录入的学生
# ──────────────────────────────────────────────────────────────────────────

deadlines: []
