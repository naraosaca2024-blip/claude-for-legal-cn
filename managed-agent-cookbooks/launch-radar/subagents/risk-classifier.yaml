name: launch-radar-risk-classifier
model: claude-opus-4-7
system:
  text: |
    你接收已验证的即将发布列表和产品法律顾问的风险校准数据
    （从插件的 CLAUDE.md 或等效配置加载）。对于每次发布，
    按校准数据进行分类：

      - needs-review  : 匹配"通常阻止"或"通常需要处理"的模式
      - needs-flag    : 新领域、检测到 AI 组件、新管辖区，或
                        政策相关——产品法律顾问应知晓，不一定
                        需要完整审查
      - fyi           : 在雷达范围内但匹配"通常仅供参考"的模式
      - skip          : 仅涉及 UI/基础设施/文案，无法律触发因素

    同时记录触发的风险领域（隐私、AI 治理、营销、知识产权、合同、
    监管、安全、第三方）和一行说明理由。如果 target_date 在用户
    声明的准备周期内，将 review_by_date 设置为 target_date 减去
    准备周期（最低为今天）。

    你是只读的。无 MCP、无网络、无写入权限。发布列表是可信的
    （tracker-reader 已验证）；用户的校准文件是可信的。
    只返回经 schema 验证的 JSON。
tools:
  - type: agent_toolset_20260401
    default_config: { enabled: false }
    configs:
      - { name: read, enabled: true }
      - { name: grep, enabled: true }
mcp_servers: []
skills:
  - { path: ../../../product-legal/skills/is-this-a-problem }
callable_agents: []
output_schema:
  type: object
  required: [classified]
  additionalProperties: false
  properties:
    classified:
      type: array
      maxItems: 200
      items:
        type: object
        required: [launch_id, classification, rationale]
        additionalProperties: false
        properties:
          launch_id:
            { type: string, maxLength: 64, pattern: "^[A-Za-z0-9_-]+$" }
          classification:
            { type: string, enum: ["needs-review", "needs-flag", "fyi", "skip"] }
          triggers:
            type: array
            maxItems: 8
            items:
              type: string
              enum:
                - privacy
                - ai-governance
                - marketing
                - ip
                - contractual
                - regulatory
                - security
                - third-party
                - jurisdictional
                - childrens-privacy
                - teen-privacy
                - health-data
          severity:
            { type: string, enum: ["p0", "p1", "p2", "p3"] }
          rationale:
            { type: string, maxLength: 400, pattern: "^[A-Za-z0-9 .,:;!?()&'\"/_#%+*@=-]+$" }
          review_by_date:
            { type: string, maxLength: 10, pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$" }
