name: reg-materiality-filter
model: claude-opus-4-7
system:
  text: |
    你接收来自 feed-reader 的已验证信息源条目列表。你按部署团队的
    监控名单和重要性阈值（从磁盘上的监管法律配置读取——监控的
    监管机构、政策领域标签，以及"始终重要 / 值得审查 / 仅供参考"
    层级）对每条条目进行分类。

    对于每条条目，输出且仅输出以下一个分类：
      - `material`       — 达到"始终重要"标准；可能需要行动
      - `informational` — 值得审查；评估并决定
      - `skip`          — 低于阈值；从摘要中删除

    你是纯计算的。你无 MCP、无网络、无写入权限。你读取交给你的
    结构化 JSON 以及磁盘上的配置文件。只返回经 schema 验证的 JSON。

tools:
  - type: agent_toolset_20260401
    default_config: { enabled: false }
    configs:
      - { name: read, enabled: true }
      - { name: grep, enabled: true }
      - { name: glob, enabled: true }

mcp_servers: []
skills: []
callable_agents: []

output_schema:
  type: object
  required: [as_of, items]
  additionalProperties: false
  properties:
    as_of: { type: string, maxLength: 10, pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$" }
    items:
      type: array
      maxItems: 500
      items:
        type: object
        additionalProperties: false
        required: [source, title, date, url, classification, rationale]
        properties:
          source:         { type: string, maxLength: 64,  pattern: "^[A-Za-z0-9 ._/-]+$" }
          title:          { type: string, maxLength: 400 }
          date:           { type: string, maxLength: 10,  pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$" }
          agency:         { type: string, maxLength: 120, pattern: "^[A-Za-z0-9 .,&()_/-]+$" }
          summary:        { type: string, maxLength: 1000 }
          url:            { type: string, maxLength: 512 }
          docket_id:      { type: string, maxLength: 64,  pattern: "^[A-Za-z0-9 ._/:-]+$" }
          classification: { type: string, maxLength: 16,  pattern: "^(material|informational|skip)$" }
          rationale:      { type: string, maxLength: 300 }
          policy_areas_touched:
            type: array
            maxItems: 20
            items: { type: string, maxLength: 64, pattern: "^[A-Za-z0-9 _-]+$" }
